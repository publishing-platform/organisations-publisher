default: &default
  adapter: postgresql
  encoding: unicode
  pool: 12

development:
  <<: *default
  database: organisations_publisher_development
  url: <%= ENV["DATABASE_URL"]%>

test:
  <<: *default
  database: organisations_publisher_test
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  database: organisations_publisher
  url: <%= ENV["DATABASE_URL"]%>
